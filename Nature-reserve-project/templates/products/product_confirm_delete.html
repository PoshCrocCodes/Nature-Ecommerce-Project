{% extends 'base.html' %}
{% block title %}Delete Product — Greenfield{% endblock %}
{% block content %}
<div class="pt-24 pb-16 min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-10 max-w-md w-full text-center">
    <div class="text-6xl mb-4">⚠️</div>
    <h1 class="font-display text-3xl font-bold text-gf-navy mb-3">Delete Product?</h1>
    <p class="text-gray-500 mb-8">Are you sure you want to delete <strong>{{ product.name }}</strong>? This action cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3">
        <a href="{% url 'producer_dashboard' %}" class="flex-1 py-3 bg-white border border-gray-200 text-gf-navy font-semibold rounded-xl hover:bg-gray-50 transition">Cancel</a>
        <button type="submit" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition">Delete</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
